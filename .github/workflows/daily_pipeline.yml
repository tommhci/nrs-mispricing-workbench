name: NRS-1 v3 Daily Pipeline

on:
  schedule:
    # Runs at 12:00 UTC daily (market hours context)
    # UTC+8 (China/Singapore): 12:00 UTC = 20:00 local
    # UTC-5 (Eastern US):      12:00 UTC = 07:00 local
    - cron: '0 12 * * *'

  # Manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai requests yfinance pandas

      - name: Run NRS-1 v3 pipeline
        # --stub: uses hardcoded data (no API key needed for testing)
        # Remove --stub once ZHIPU_API_KEY is set in repo secrets
        run: python nrs1_v3.py --stub
        env:
          # Set in: GitHub repo → Settings → Secrets → Actions → New repository secret
          # Name: ZHIPU_API_KEY, Value: <your key from open.bigmodel.cn>
          # Then remove --stub from the run command above to enable live mode
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          GMAIL_SENDER:       ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_RECIPIENT:    ${{ secrets.GMAIL_RECIPIENT }}

      - name: Commit updated data files
        run: |
          git config --local user.email "nrs1-bot@github.com"
          git config --local user.name "NRS-1 v3 Bot"
          git add nrs1_history.jsonl nrs1_report.md nrs1_audit.jsonl
          git diff --staged --quiet || git commit -m \
            "🤖 NRS-1 v3 $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
