name: NRS-1 Daily Pipeline

on:
  schedule:
    # Runs at 08:00 UTC every day (adjust for your timezone)
    # UTC+8 (China/Singapore): 08:00 UTC = 16:00 local
    # UTC-5 (Eastern US):      08:00 UTC = 03:00 local
    - cron: '0 8 * * *'

  # Also allows manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic yfinance

      - name: Run NRS-1 pipeline (stub mode)
        # Change --stub to nothing when you have a real API key set in secrets
        run: python nrs1_v2.py --stub
        env:
          # Add your API key in: GitHub repo → Settings → Secrets → Actions
          # Then remove --stub from the run command above
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated data files
        run: |
          git config --local user.email "nrs1-bot@github.com"
          git config --local user.name "NRS-1 Pipeline Bot"
          git add nrs1_history.jsonl nrs1_report.md nrs1_audit.jsonl
          git diff --staged --quiet || git commit -m "🤖 NRS-1 daily update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
